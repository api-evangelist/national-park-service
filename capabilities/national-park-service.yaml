        call: national-park-service.get
        with:
          parkCode: rest.parkCode
          stateCode: rest.stateCode
          dateStart: rest.dateStart
          dateEnd: rest.dateEnd
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/newsreleases
