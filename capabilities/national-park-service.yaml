  - type: mcp
    namespace: national-park-service-mcp
    port: 9090
    transport: http
    description: MCP adapter for National Park Service Data API. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-activities-available-within-parks
      description: List activities available within parks
      hints:
