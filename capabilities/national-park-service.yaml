naftiko: 1.0.0-alpha2
info:
  label: National Park Service Data API
  description: 'National Park Service Data API. 11 operations. Lead operation: List activities available within parks. Self-contained
    Naftiko capability covering one National Park Service business surface.'
  tags:
  - National Park Service
  - National Park Service Data API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_PARK_SERVICE_API_KEY: NATIONAL_PARK_SERVICE_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-park-service
    baseUri: https://developer.nps.gov/api/v1
    description: National Park Service Data API business capability. Self-contained, no shared references.
    resources:
    - name: activities
      path: /activities
      operations:
      - name: get
        method: GET
        description: List activities available within parks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts
      path: /alerts
      operations:
      - name: get
        method: GET
        description: Retrieve alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: stateCode
          in: query
          type: string
        - name: q
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: start
          in: query
          type: integer
    - name: articles
      path: /articles
      operations:
      - name: get
        method: GET
        description: Retrieve articles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: q
          in: query
          type: string
    - name: campgrounds
      path: /campgrounds
      operations:
      - name: get
        method: GET
        description: Retrieve campgrounds
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: stateCode
          in: query
          type: string
    - name: events
      path: /events
      operations:
      - name: get
        method: GET
        description: Retrieve events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: stateCode
          in: query
          type: string
        - name: dateStart
          in: query
          type: string
        - name: dateEnd
          in: query
          type: string
    - name: newsreleases
      path: /newsreleases
      operations:
      - name: get
        method: GET
        description: Retrieve news releases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: q
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: parks
      path: /parks
      operations:
      - name: get
        method: GET
        description: Retrieve parks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
          description: Comma-delimited list of park codes (e.g., acad,dena).
        - name: stateCode
          in: query
          type: string
          description: Comma-delimited list of two-letter state codes.
        - name: q
          in: query
          type: string
          description: Free-text search term.
        - name: limit
          in: query
          type: integer
        - name: start
          in: query
          type: integer
    - name: people
      path: /people
      operations:
      - name: get
        method: GET
        description: Retrieve historical people
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: q
          in: query
          type: string
    - name: places
      path: /places
      operations:
      - name: get
        method: GET
        description: Retrieve places
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: stateCode
          in: query
          type: string
        - name: q
          in: query
          type: string
    - name: topics
      path: /topics
      operations:
      - name: get
        method: GET
        description: List topics covered by NPS
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: visitorcenters
      path: /visitorcenters
      operations:
      - name: get
        method: GET
        description: Retrieve visitor centers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parkCode
          in: query
          type: string
        - name: stateCode
          in: query
          type: string
    authentication:
      type: apikey
      key: X-Api-Key
      value: '{{env.NATIONAL_PARK_SERVICE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: national-park-service-rest
    port: 8080
    description: REST adapter for National Park Service Data API. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activities
      name: activities
      description: REST surface for activities.
      operations:
      - method: GET
        name: get
        description: List activities available within parks
        call: national-park-service.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts
      name: alerts
      description: REST surface for alerts.
      operations:
      - method: GET
        name: get
        description: Retrieve alerts
        call: national-park-service.get
        with:
          parkCode: rest.parkCode
          stateCode: rest.stateCode
          q: rest.q
          limit: rest.limit
          start: rest.start
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/articles
      name: articles
      description: REST surface for articles.
      operations:
