aid: national-park-service
name: National Park Service
description: >-
  The National Park Service is a federal agency responsible for managing and protecting the United States' national
  parks, monuments, and historic sites. Established in 1916, the NPS works to preserve natural and cultural resources
  for future generations while providing opportunities for the public to enjoy and learn from these special places.
