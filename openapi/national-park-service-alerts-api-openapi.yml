openapi: 3.0.3
info:
  title: National Park Service Data Activities Alerts API
  description: The NPS Data API provides official, authoritative data and content about United States national parks, monuments, and historic sites. The API delivers information about parks, alerts, news releases, events, places, visitor centers, campgrounds, articles, people, and more.
  version: 1.0.0
  contact:
    name: National Park Service Developer Resources
    url: https://www.nps.gov/subjects/developer/api-documentation.htm
servers:
- url: https://developer.nps.gov/api/v1
  description: Production
security:
- apiKey: []
tags:
- name: Alerts
paths:
  /alerts:
    get:
      summary: Retrieve alerts
      description: Park alerts including caution, danger, closures, and information notices.
      parameters:
      - name: parkCode
        in: query
        schema:
          type: string
      - name: stateCode
        in: query
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: start
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: A page of alert records.
      tags:
      - Alerts
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
